<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overall MVP</title>
    <link rel="stylesheet" href="css/MVP.css">
</head>
<body>
    <!-- Video Background Removed -->

    <!-- Main Container -->
    <div class="main-container">
        <!-- Header Section -->
        <div class="header-section">
            <h1 class="main-title">Overall MVP</h1>
            <div class="title-underline"></div>
        </div>

        <!-- MVP Cards Container -->
        <div class="mvp-cards-container">
            <div class="mvp-card" id="mvp-card-1">
                <div class="card-rank">
                    <span class="rank-label">#1</span>
                </div>
                <div class="player-avatar">
                    <img src="assets/c1.png" alt="Character" class="character-img">
                    <div class="crown-icon">👑</div>
                </div>
                <div class="player-info">
                    <h3 class="team-name">Loading...</h3>
                    <h2 class="player-name">Loading...</h2>
                    <div class="stats-container">
                        <div class="stat-item">
                            <span class="stat-label">Finish</span>
                            <span class="stat-value" id="finish-1">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Contribution</span>
                            <span class="stat-value" id="cont-1">-</span>
                        </div>
                    </div>
                </div>
                <div class="card-glow"></div>
            </div>

            <div class="mvp-card" id="mvp-card-2">
                <div class="card-rank">
                    <span class="rank-label">#2</span>
                </div>
                <div class="player-avatar">
                    <img src="assets/c2.png" alt="Character" class="character-img">
                </div>
                <div class="player-info">
                    <h3 class="team-name">Loading...</h3>
                    <h2 class="player-name">Loading...</h2>
                    <div class="stats-container">
                        <div class="stat-item">
                            <span class="stat-label">Finish</span>
                            <span class="stat-value" id="finish-2">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Contribution</span>
                            <span class="stat-value" id="cont-2">-</span>
                        </div>
                    </div>
                </div>
                <div class="card-glow"></div>
            </div>

            <div class="mvp-card" id="mvp-card-3">
                <div class="card-rank">
                    <span class="rank-label">#3</span>
                </div>
                <div class="player-avatar">
                    <img src="assets/c3.png" alt="Character" class="character-img">
                </div>
                <div class="player-info">
                    <h3 class="team-name">Loading...</h3>
                    <h2 class="player-name">Loading...</h2>
                    <div class="stats-container">
                        <div class="stat-item">
                            <span class="stat-label">Finish</span>
                            <span class="stat-value" id="finish-3">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Contribution</span>
                            <span class="stat-value" id="cont-3">-</span>
                        </div>
                    </div>
                </div>
                <div class="card-glow"></div>
            </div>

            <div class="mvp-card" id="mvp-card-4">
                <div class="card-rank">
                    <span class="rank-label">#4</span>
                </div>
                <div class="player-avatar">
                    <img src="assets/c4.png" alt="Character" class="character-img">
                </div>
                <div class="player-info">
                    <h3 class="team-name">Loading...</h3>
                    <h2 class="player-name">Loading...</h2>
                    <div class="stats-container">
                        <div class="stat-item">
                            <span class="stat-label">Finish</span>
                            <span class="stat-value" id="finish-4">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Contribution</span>
                            <span class="stat-value" id="cont-4">-</span>
                        </div>
                    </div>
                </div>
                <div class="card-glow"></div>
            </div>
        </div>
    </div>

    <script src="js/MVP.js"></script>
</body>
</html>
