<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elimination Broadcast Overlay - Shatter Impact</title>
  <meta name="viewport" content="width=700, initial-scale=1">
  <link rel="stylesheet" href="css/ElimBroadcast.css">
  <style>
    /* Additional inline styles for enhanced effects */
    body {
      background: transparent;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    /* Subtle background particle effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(242, 152, 73, 0.02) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(217, 94, 50, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div id="elim-card-container">
    <!-- Dynamic content will be inserted here -->
  </div>
  
  <!-- Preload fonts and optimize performance -->
  <div style="position: absolute; visibility: hidden; font-family: 'MicrogrammaD'; font-family: 'AmericanCaptain';">.</div>
  
  <script src="js/ElimBroadcast.js"></script>
</body>
</html>
