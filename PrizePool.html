<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prize Pool Split</title>
    <link rel="stylesheet" href="css/PrizePool.css">
</head>
<body>
    <!-- Video Background Removed -->

    <!-- Main Container -->
    <div class="main-container">
        <!-- Header -->
        <div class="header-section">
            <h1 class="main-title">PRIZE POOL SPLIT</h1>
            <div class="title-underline"></div>
        </div>

        <!-- Content Container -->
        <div class="content-container">
            <!-- Champion Section - Full Width -->
            <div class="champion-section">
                <div class="prize-card champion">
                    <div class="position-label">CHAMPION</div>
                    <div class="prize-amount">15,000 INR</div>
                </div>
            </div>

            <!-- Runner Up Grid - 2 Columns -->
            <div class="runner-up-grid">
                <div class="prize-card runner-up">
                    <div class="position-label">RUNNER UP</div>
                    <div class="prize-amount">10,000 INR</div>
                </div>
                <div class="prize-card second-runner">
                    <div class="position-label">2nd RUNNER UP</div>
                    <div class="prize-amount">8,000 INR</div>
                </div>
            </div>

            <!-- Middle Positions Grid - 2 Columns -->
            <div class="middle-positions-grid">
                <div class="prize-card fourth">
                    <div class="position-label">FOURTH POSITION</div>
                    <div class="prize-amount">5,000 INR</div>
                </div>
                <div class="prize-card fifth">
                    <div class="position-label">FIFTH POSITION</div>
                    <div class="prize-amount">3,500 INR</div>
                </div>
            </div>

            <!-- Lower Positions Grid - 2 Columns -->
            <div class="lower-positions-grid">
                <div class="prize-card sixth">
                    <div class="position-label">SIXTH POSITION</div>
                    <div class="prize-amount">3,000 INR</div>
                </div>
                <div class="prize-card seventh">
                    <div class="position-label">SEVENTH POSITION</div>
                    <div class="prize-amount">2,500 INR</div>
                </div>
            </div>

            <!-- Other Rewards Section - 3 Columns -->
            <div class="other-rewards-section">
                <div class="reward-card mvp">
                    <div class="reward-label">MOST VALUABLE PLAYERS</div>
                    <div class="reward-amount">1,000 INR</div>
                </div>
                <div class="reward-card fan-favorite">
                    <div class="reward-label">FAN FAVOURITE</div>
                    <div class="reward-amount">1,000 INR</div>
                </div>
                <div class="reward-card best-igl">
                    <div class="reward-label">BEST IGL</div>
                    <div class="reward-amount">1,000 INR</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/PrizePool.js"></script>
</body>
</html>
